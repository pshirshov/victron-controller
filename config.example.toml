# victron-controller — example config
#
# Copy to /data/etc/victron-controller/config.toml on the GX, fill in
# credentials, and restart the service. Every section is optional; any
# omitted section falls back to the safe defaults in crates/shell/src/config.rs
# and crates/core/src/knobs.rs.
#
# Quick safety note: leave [dbus] writes_enabled = false until you've
# watched the service in observer mode for long enough to trust it.
# When writes are disabled the service computes + logs what it WOULD do
# without touching the inverter.

# =============================================================================
# D-Bus writer
# =============================================================================
[dbus]
# When false, WriteDbus effects are logged but NOT emitted. Distinct from
# the runtime `writes_enabled` kill switch — this one is a config-file
# master switch. Default: true.
writes_enabled = false

# D-Bus service names override. Defaults come from SPEC §10.5 and match
# the user's Venus 3.70 install captured by scripts/discover-victron.sh.
# Only override when your DeviceInstance numbers drift or you migrate
# to different cabling.
# [dbus.services]
# system             = "com.victronenergy.system"
# settings           = "com.victronenergy.settings"
# battery            = "com.victronenergy.battery.socketcan_can0"
# mppt_0             = "com.victronenergy.solarcharger.ttyUSB1"
# mppt_1             = "com.victronenergy.solarcharger.ttyS2"
# pvinverter_soltaro = "com.victronenergy.pvinverter.cgwacs_ttyUSB2_mb1"
# grid               = "com.victronenergy.grid.cgwacs_ttyUSB0_mb1"
# vebus              = "com.victronenergy.vebus.ttyS3"
# evcharger          = "com.victronenergy.evcharger.cgwacs_ttyUSB0_mb2"

# =============================================================================
# MQTT — the central nervous system per SPEC §4 / §10.1
# =============================================================================
[mqtt]
# Leave host empty to disable MQTT entirely (the service still controls
# D-Bus, but no HA integration, no retained state, no log transport).
host       = "mqtt.example.invalid"
port       = 1883
username   = "victron-controller"
password   = "REPLACE_ME"

# TLS configuration. When tls = true, ca_path is mandatory.
tls        = false
# ca_path  = "/data/etc/victron-controller/ca.pem"

# Topic root — all state, commands, and discovery are namespaced under this.
topic_root = "victron-controller"

# =============================================================================
# myenergi Zappi + Eddi
# =============================================================================
[myenergi]
# Leave username empty (the default) to skip myenergi integration.
username     = ""
password     = ""
director_url = "https://s18.myenergi.net"
# Optional — leave as None to skip device-specific poll/write.
# zappi_serial = "12345678"
# eddi_serial  = "87654321"
# Poll cadence. myenergi data is ~5 min granular per SPEC, so 15 s is
# mostly for plug-state transition reactivity.
poll_period    = "15s"
# When false, CallMyenergi effects are logged but not POSTed. Mirrors
# [dbus] writes_enabled. Flip to true once you trust the shadow run.
# Default if omitted: true.
writes_enabled = false

# =============================================================================
# Forecast providers — Solcast + Forecast.Solar + Open-Meteo (SPEC §5.7)
# =============================================================================
# Each provider is optional; when its required fields are empty the
# provider task isn't spawned and no events are emitted.

[forecast]
# Site timezone for solar-boundary bucketing; do not rely on machine TZ.
# Venus OS defaults to TZ=UTC, but Open-Meteo's `timezone=auto` returns
# site-local times — comparing those against `Local::now()` on a UTC
# machine shifts the today/tomorrow split by the site's offset. Set
# this to the IANA name of the site (e.g. "Europe/London", "America/
# Los_Angeles"). A typo fails fast at startup.
timezone = "Europe/London"

[forecast.solcast]
# api_key  = "REPLACE_ME"
# site_ids = ["rooftop-site-uuid-1", "rooftop-site-uuid-2"]
cadence    = "2h"   # free tier: 10 calls/day/site

[forecast.forecast_solar]
# No API key required for the free tier.
# latitude  = 55.9
# longitude = -3.2
# Representative planes — user configures up to a handful. Each plane
# costs one API call per refresh so keep the list short on free tier.
# Azimuth follows the compass convention: 0 = N, 90 = E, 180 = S, 270 = W.
# planes    = [
#   { tilt_deg = 35, azimuth_deg = 180, kwp = 2.0 },
#   { tilt_deg = 40, azimuth_deg = 90,  kwp = 1.5 },
# ]
cadence     = "1h"

[forecast.open_meteo]
# No key. Free. No rate limit on sensible cadences.
# latitude  = 55.9
# longitude = -3.2
# planes    = [
#   { tilt_deg = 35, azimuth_deg = 180, kwp = 2.0 },
# ]
cadence     = "30m"

# =============================================================================
# Local dashboard — not implemented yet (per user deferral); reserved.
# =============================================================================
[dashboard]
port = 8910
bind = "0.0.0.0"

# =============================================================================
# Outdoor temperature — optional Matter MQTT bridge (PR-matter-outdoor-temp)
# =============================================================================
# When `mqtt_topic` is set, the controller subscribes to that topic on the
# same broker as `[mqtt]` above and feeds incoming readings as the
# `outdoor_temperature` sensor. The Open-Meteo current-weather poller
# stays running as a fallback — whichever source publishes most recently
# wins. Body must be a JSON-encoded signed int in centi-Celsius (e.g.
# `1640` = 16.4°C); `null` / non-numeric bodies are silently dropped.
[outdoor_temperature_local]
# mqtt_topic  = "matter/1/attributes/107_1026_0"
# min_celsius = -20.0
# max_celsius = 50.0

# =============================================================================
# EV state-of-charge + charge target — external MQTT publisher
# (PR-ev-soc-sensor + PR-auto-extended-charge)
# =============================================================================
# Optional: subscribe to an external MQTT publisher's HA-discovery
# configs to pull the EV's reported SoC and the configured charge-target
# SoC into our sensor table. For each `*_topic` we subscribe to the
# discovery topic, parse the retained JSON for `state_topic`, then
# subscribe to that for the actual readings. Each path is
# independently optional — leave a topic commented out to keep that
# slot dormant.
#
# `charge_target_topic` is consumed by the daily 04:30 auto-extended-
# charge evaluation when `evcharger.extended` mode is `Auto`. Without
# it, only the SoC branch (`ev_soc < 40`) can fire the night extended
# charge.
#
# [ev]
# soc_topic           = "homeassistant/sensor/example_ev_vin_mg/example_ev_vin_soc/config"
# charge_target_topic = "homeassistant/number/example_ev_vin_mg/example_ev_vin_target_soc/config"

# =============================================================================
# Runtime tuning
# =============================================================================
[tuning]
# Heartbeat period for freshness decay + periodic controller re-evaluation.
# 1 s is plenty (controllers are pure arithmetic on a small world).
tick_period = "1s"

# =============================================================================
# Hardware (deploy-time constants — see SPEC §7 / PR-hardware-config)
# =============================================================================
# These were previously hard-coded `const`s inside the controller
# crates. They are deploy-time-immutable: not exposed on the dashboard,
# not retained over MQTT, not part of the runtime knob inventory. Edit
# this section only when the install's physical hardware changes
# (different inverter, different breaker rating, different grid voltage
# band, different battery stack voltage). Restart the service to pick
# up changes.
[hardware]
# Inverter / battery limits — used by setpoint controller's max_discharge formula.
inverter_max_discharge_w     = 5000      # MultiPlus AC-export ceiling.
inverter_safe_discharge_w    = 4020      # Margin below the inverter "forced grid charge above ~4.8 kW" glitch.

# AC-input current-limit bounds — used by current_limit controller.
max_grid_current_a           = 65        # Main breaker rating ceiling.
min_system_current_a         = 10        # Floor — keeps inverter aux fed.

# Setpoint behaviour.
idle_setpoint_w              = 10        # Forced-import baseline (Soltaro 23:55 quirk).
baseload_consumption_w       = 1200      # Evening planner: preserve_battery threshold.

# Grid-side knob ceilings — split from the former single 10_000 W cap.
grid_export_knob_max_w       = 6000      # ESB G99 typical authorisation. Caps grid_export_limit_w knob.
grid_import_knob_max_w       = 13000     # MultiPlus continuous import capability. Caps grid_import_limit_w knob.

# Capacity model.
battery_nominal_voltage_v    = 48.0      # Pylontech 48V stack.

# EN 50160 grid voltage band — used by current_limit's effective_grid_v sanity gate.
grid_nominal_voltage_v       = 230.0
grid_min_sensible_voltage_v  = 207.0     # EN 50160 -10%.
grid_max_sensible_voltage_v  = 260.0     # EN 50160 +10% + 7V noise headroom.

# PR-pinned-registers: list of (path, type, value) triplets the shell
# re-asserts on a 1 h cadence. Each entry is read once an hour; if the
# bus value differs from the configured constant, an Effect::WriteDbus
# is emitted to put it back. Drift counters + timestamps surface on
# the dashboard's Detail tab. Corrective writes go through the same
# `[dbus] writes_enabled` chokepoint as every other actuating effect.
# Empty by default — opt-in feature.
#
# `path` joins the well-known service name and the D-Bus object path
# with a single `:` separator. `type` is one of "bool" | "int" |
# "float" | "string"; `value` must be type-compatible (an integer
# literal is accepted for type = "float" as a convenience).
#
# Example registers that the legacy NR flow used to enforce; uncomment
# and adjust to taste:
#
# [[dbus_pinned_registers]]
# path  = "com.victronenergy.vebus.ttyS3:/Devices/0/Settings/PowerAssistEnabled"
# type  = "bool"
# value = true
#
# [[dbus_pinned_registers]]
# path  = "com.victronenergy.settings:/Settings/CGwacs/MaxFeedInPower"
# type  = "float"
# value = 5000.0
#
# [[dbus_pinned_registers]]
# path  = "com.victronenergy.settings:/Settings/CGwacs/Hub4Mode"
# type  = "int"
# value = 1
